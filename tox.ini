[tox]
requires = tox>=4.15
env_list = py{311,312,313}, lint, typecheck, security

[testenv]
description = Run tests with pytest
deps =
    pytest>=8.0
    pytest-asyncio>=0.23
    pytest-cov>=5.0
extras = llm-judge
commands =
    pytest {posargs:tests -v --cov=src/clawarena --cov-report=term-missing}

[testenv:lint]
description = Run linters (ruff + pylint)
skip_install = false
deps =
    ruff>=0.5
    pylint>=3.2
commands =
    ruff format --check src tests
    ruff check src tests
    pylint src/clawarena --output-format=colorized

[testenv:typecheck]
description = Run mypy type checker
deps =
    mypy>=1.10
    types-PyYAML
commands =
    mypy src/clawarena

[testenv:security]
description = Run bandit security scanner
skip_install = true
deps =
    bandit[toml]>=1.7
commands =
    bandit -r src/clawarena -c pyproject.toml
