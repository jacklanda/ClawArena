id: example.hello_world
name: "Hello World Example"
category: general
difficulty: easy
timeout_seconds: 60
execution_mode: sandboxed

description: |
  A simple example task to verify your ClawArena setup.
  The agent should respond with a greeting.

instruction: |
  Respond with a friendly greeting that includes the word "hello" and
  mentions the current date context provided.

context:
  date: "2026-03-22"
  greeting_style: "casual"

expected_output:
  contains:
    - "hello"

evaluation:
  evaluator: exact_match
  config:
    contains:
      - "hello"
    case_sensitive: false
    pass_threshold: 0.50

metadata:
  tags: ["example", "test"]
  version: "1.0"
