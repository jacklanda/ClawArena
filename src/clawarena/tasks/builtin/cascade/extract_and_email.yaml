expected_output:
  total_revenue: 88949.00
  best_product: "Enterprise Plan"
  worst_product: "Starter Plan"
  best_day: "2025-03-14"

evaluation:
  evaluator: composite
  config:
    evaluators:
      - evaluator: rubric
        weight: 5
        config:
          criteria:
            - name: metric_accuracy
              description: "Extracted metrics are numerically correct: total revenue ~$88,949, best product is Enterprise Plan, worst is Starter Plan, best day is Friday March 14"
              weight: 4
            - name: wow_change
              description: "Week-over-week change is calculated correctly relative to the $142,500 previous week (showing a significant decline)"
              weight: 2
      - evaluator: rubric
        weight: 5
        config:
          criteria:
            - name: summary_quality
              description: "Summary is 3-4 sentences, highlights the revenue decline vs previous week, notes Enterprise Plan strength, and flags the overall drop as a concern"
              weight: 3
            - name: email_format
              description: "Email is professional, includes metrics in a scannable format (table or bullets), contains the narrative summary, and suggests a concrete action item"
              weight: 3
            - name: pipeline_structure
              description: "Output is clearly organized into three labeled steps showing the full pipeline"
              weight: 1

timeout_seconds: 240
execution_mode: sandboxed
metadata:
  tags: ["cascade", "data-extraction", "email", "multi-step"]
  version: "1.0"
