  notification_recipients:
    - name: "VP of Engineering"
      email: "vp-eng@company.com"
    - name: "Order Service Owner"
      email: "order-team@company.com"
    - name: "Payment Service Owner"
      email: "payments-team@company.com"
    - name: "Inventory Service Owner"
      email: "inventory-team@company.com"

expected_output: null

evaluation:
  evaluator: composite
  config:
    evaluators:
      - evaluator: rubric
        weight: 4
        config:
          criteria:
            - name: log_parsing
              description: "Step 1 correctly parses all log entries with accurate timestamps, levels, services, and messages"
              weight: 2
            - name: error_identification
              description: "Step 2 identifies all ERROR and FATAL entries, groups them by service (order-service, payment-service, notification-service, inventory-service), and flags recurring patterns"
              weight: 3
            - name: categorization
              description: "Step 3 correctly categorizes: order-service errors as Application (null pointer), payment-service as External (Stripe timeout), notification-service as Data (missing template field), inventory-service as Infrastructure (DB pool exhaustion)"
              weight: 3
      - evaluator: rubric
        weight: 6
        config:
          criteria:
            - name: incident_report_quality
              description: "Step 4 produces a complete incident report with ID, correct severity (Critical due to FATAL + multi-service impact), affected services list, timeline, plausible root cause hypothesis, and actionable immediate steps"
              weight: 4
            - name: root_cause_reasoning
              description: "Root cause hypothesis shows reasoning — e.g., DB pool exhaustion in inventory-service may be contributing to gateway latency, payment failures are from external Stripe outage, order validation is a code bug"
              weight: 3
            - name: email_quality
              description: "Step 5 email is concise, professional, includes incident summary and severity, current impact on services, and clear next steps"
              weight: 2
            - name: pipeline_coherence
              description: "Each step builds on the previous one; the incident report reflects the categorized errors, and the email reflects the incident report"
              weight: 2

timeout_seconds: 360
execution_mode: sandboxed
metadata:
  tags: ["cascade", "log-analysis", "incident-response", "multi-step", "pipeline"]
  version: "1.0"
