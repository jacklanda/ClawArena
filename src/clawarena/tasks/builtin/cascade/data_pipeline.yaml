id: cascade.data_pipeline
name: Log Analysis to Incident Report Pipeline
category: cascade
difficulty: hard
description: >
  A complex multi-step pipeline: parse raw application logs, identify and
  classify errors, generate a structured incident report, and draft a
  stakeholder notification email.

instruction: |
  Execute the following five-step pipeline.  Output each step clearly
  labeled so the work can be verified at each stage.

  **Step 1 — Parse Logs:**
  Parse the raw log entries in the context.  For each entry, extract:
    - Timestamp
    - Log level (INFO, WARN, ERROR, FATAL)
    - Service name
    - Message

  **Step 2 — Identify Errors:**
  Filter to only ERROR and FATAL entries.  Group them by service.
  For each error, note whether it appears to be a recurring pattern
  (same error message appearing multiple times).

  **Step 3 — Categorize:**
  Classify each error group into one of these categories:
    - **Infrastructure** — network, DNS, timeout, connection issues
    - **Application** — null pointers, unhandled exceptions, logic errors
    - **Data** — corrupt records, schema violations, missing fields
    - **External** — third-party API failures, rate limits

  **Step 4 — Generate Incident Report:**
  Produce a structured incident report with:
    - Incident ID (generate one in the format INC-YYYYMMDD-NNN)
    - Severity (Critical / High / Medium / Low) based on the error
      patterns: FATAL = Critical, recurring ERRORs across services = High,
      isolated ERRORs = Medium
    - Affected services
    - Timeline of first and last occurrence
    - Root cause hypothesis based on the error patterns
    - Recommended immediate actions

  **Step 5 — Draft Notification Email:**
  Compose a concise incident notification email from the on-call engineer
  to the engineering leadership and affected service owners.  The email
  should include the incident summary, current impact, and next steps.

context:
  on_call_engineer: "Morgan Blake"
  log_entries: |
    2025-03-18T02:14:33Z INFO  [api-gateway] Request received: POST /api/v2/orders
    2025-03-18T02:14:34Z INFO  [order-service] Processing order ORD-99812
    2025-03-18T02:14:35Z ERROR [order-service] Failed to validate order: NullPointerException at OrderValidator.java:142 — customer.address.zipCode is null
    2025-03-18T02:14:35Z WARN  [order-service] Retry attempt 1/3 for order ORD-99812
    2025-03-18T02:14:36Z ERROR [order-service] Failed to validate order: NullPointerException at OrderValidator.java:142 — customer.address.zipCode is null
    2025-03-18T02:14:36Z ERROR [order-service] Failed to validate order: NullPointerException at OrderValidator.java:142 — customer.address.zipCode is null
    2025-03-18T02:14:37Z ERROR [order-service] Order ORD-99812 failed after 3 retries
    2025-03-18T02:15:01Z INFO  [payment-service] Processing payment for ORD-99810
    2025-03-18T02:15:03Z ERROR [payment-service] Connection timeout to Stripe API: connect timed out after 5000ms
    2025-03-18T02:15:08Z ERROR [payment-service] Connection timeout to Stripe API: connect timed out after 5000ms
    2025-03-18T02:15:13Z ERROR [payment-service] Connection timeout to Stripe API: connect timed out after 5000ms
    2025-03-18T02:15:14Z FATAL [payment-service] Circuit breaker OPEN for stripe-client — 3 consecutive failures
    2025-03-18T02:15:14Z ERROR [payment-service] Payment processing halted — circuit breaker open
    2025-03-18T02:16:00Z INFO  [notification-service] Sending order confirmation for ORD-99808
    2025-03-18T02:16:01Z ERROR [notification-service] Failed to render email template: missing field 'order.shippingEstimate' in template order-confirmation-v2.html
    2025-03-18T02:16:30Z ERROR [notification-service] Failed to render email template: missing field 'order.shippingEstimate' in template order-confirmation-v2.html
    2025-03-18T02:17:00Z WARN  [api-gateway] Elevated latency detected: p99 = 4200ms (threshold: 2000ms)
    2025-03-18T02:17:15Z ERROR [inventory-service] Database connection pool exhausted: 50/50 connections in use
    2025-03-18T02:17:16Z ERROR [inventory-service] Database connection pool exhausted: 50/50 connections in use
    2025-03-18T02:17:17Z FATAL [inventory-service] Unable to serve requests — all DB connections in use, entering degraded mode
    2025-03-18T02:17:30Z ERROR [api-gateway] 503 Service Unavailable returned to client — upstream inventory-service unhealthy
