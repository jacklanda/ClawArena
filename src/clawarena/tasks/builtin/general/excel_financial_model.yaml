id: general.excel_financial_model
name: Build Financial Projection Model from Assumptions
category: general
difficulty: hard
description: >
  Given a set of financial assumptions and a base year of actuals,
  compute a 3-year projection model including revenue, COGS, operating
  expenses, EBITDA, and free cash flow — replicating the kind of
  linked financial model commonly built in Excel.

instruction: |
  You are given base-year (Year 0) actuals and a set of growth/margin
  assumptions.  Compute the 3-year financial projection (Years 1-3).

  === Year 0 Actuals ===
  Revenue:              $1,000,000
  COGS:                   $400,000
  Gross Profit:           $600,000  (= Revenue - COGS)
  Operating Expenses:     $350,000
  EBITDA:                 $250,000  (= Gross Profit - OpEx)
  Depreciation:            $50,000
  EBIT:                   $200,000  (= EBITDA - Depreciation)
  Tax Rate:                    25%
  Net Income:             $150,000  (= EBIT * (1 - Tax Rate))
  CapEx:                   $80,000
  Change in Working Cap:   $20,000
  Free Cash Flow:         $100,000  (= Net Income + Depreciation - CapEx - ΔWC)

  === Assumptions for Years 1-3 ===
  Revenue Growth:      Year 1: 20%,  Year 2: 15%,  Year 3: 10%
  COGS % of Revenue:   Year 1: 38%,  Year 2: 36%,  Year 3: 35%
  OpEx Growth:         Year 1: 10%,  Year 2: 8%,   Year 3: 5%
  Depreciation:        Grows by $10,000 per year (linear)
  Tax Rate:            25% (constant)
  CapEx:               Year 1: $100,000, Year 2: $120,000, Year 3: $130,000
  ΔWorking Capital:    5% of revenue increase from prior year

  Compute each line item for Years 1, 2, and 3.

  Return your answer in EXACTLY this format (no $ signs, no commas in
  numbers, round to nearest whole number):

  YEAR_1:
  Revenue: <value>
  COGS: <value>
  Gross_Profit: <value>
  OpEx: <value>
  EBITDA: <value>
  Depreciation: <value>
  EBIT: <value>
  Tax: <value>
  Net_Income: <value>
  CapEx: <value>
  Delta_WC: <value>
  FCF: <value>

  YEAR_2:
  Revenue: <value>
  ...

  YEAR_3:
  Revenue: <value>
  ...

context:
  model_type: three_statement
  base_year_revenue: 1000000

expected_output: |
  YEAR_1:
  Revenue: 1200000
  COGS: 456000
  Gross_Profit: 744000
  OpEx: 385000
  EBITDA: 359000
  Depreciation: 60000
  EBIT: 299000
  Tax: 74750
  Net_Income: 224250
  CapEx: 100000
  Delta_WC: 10000
  FCF: 174250

  YEAR_2:
  Revenue: 1380000
  COGS: 496800
  Gross_Profit: 883200
  OpEx: 415800
  EBITDA: 467400
  Depreciation: 70000
  EBIT: 397400
  Tax: 99350
  Net_Income: 298050
  CapEx: 120000
  Delta_WC: 9000
  FCF: 239050

  YEAR_3:
  Revenue: 1518000
  COGS: 531300
  Gross_Profit: 986700
  OpEx: 436590
  EBITDA: 550110
  Depreciation: 80000
  EBIT: 470110
  Tax: 117528
  Net_Income: 352583
  CapEx: 130000
  Delta_WC: 6900
  FCF: 295683

evaluation:
  evaluator: exact_match
  config:
    contains:
      - "Revenue: 1200000"
      - "COGS: 456000"
      - "EBITDA: 359000"
      - "Net_Income: 224250"
      - "FCF: 174250"
      - "Revenue: 1380000"
      - "COGS: 496800"
      - "EBITDA: 467400"
      - "Net_Income: 298050"
      - "FCF: 239050"
      - "Revenue: 1518000"
      - "COGS: 531300"
      - "EBITDA: 550110"
      - "Net_Income: 352583"
      - "FCF: 295683"
    case_sensitive: false

timeout_seconds: 300
execution_mode: sandboxed
metadata:
  tags: ["excel", "financial-model", "projection", "DCF", "EBITDA", "multi-year"]
  version: "1.0"
